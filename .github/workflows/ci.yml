# CI for the cueBreaker Go backend. Lives under .github/workflows so it runs on
# both GitHub and the self-hosted Forgejo (git.horn) runners — mirrors the
# sibling beetDeck / AlbFetcharr repos' CI placement.
name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
