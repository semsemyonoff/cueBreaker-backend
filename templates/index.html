<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cueBreaker</title>
<link rel="icon" type="image/svg+xml" href="/static/logo.svg">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <img src="/static/logo.svg" alt="cueBreaker" class="header-logo" onclick="navigateTo('')">
  <h1 onclick="navigateTo('')">cue<span>Breaker</span></h1>
</header>

<div class="container">
  <!-- Browse page -->
  <div class="page active" id="page-browse">
    <div class="toolbar">
      <input class="search-box" type="text" id="search" placeholder="Search..." autocomplete="off">
      <button class="btn btn-rescan" id="rescan-btn" onclick="rescan()">Rescan</button>
    </div>
    <div class="stats" id="stats"></div>
    <div id="tree-root"><div class="loading">Scanning...</div></div>
  </div>

  <!-- Album page -->
  <div class="page" id="page-album">
    <button class="back-btn" onclick="navigateTo('')">&larr; Back to list</button>
    <div id="album-content"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>
let allData = [];
let openFolders = new Set();
let scrollY = 0;
let currentSearch = '';

async function scan() {
  const res = await fetch('/api/scan');
  allData = await res.json();
  route();
}

async function rescan() {
  const btn = document.getElementById('rescan-btn');
  btn.disabled = true;
  btn.textContent = 'Scanning...';
  document.getElementById('tree-root').innerHTML = '<div class="loading">Scanning...</div>';
  await scan();
  btn.disabled = false;
  btn.textContent = 'Rescan';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ── Routing ── */

function navigateTo(hash) {
  if (hash) {
    scrollY = window.scrollY;
    location.hash = hash;
  } else {
    location.hash = '';
  }
}

function route() {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash) {
    showPage('album');
    loadAlbum(hash);
  } else {
    showPage('browse');
    renderTree(filteredData());
    window.scrollTo(0, scrollY);
  }
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
}

window.addEventListener('hashchange', route);

/* ── Tree ── */

function filteredData() {
  if (!currentSearch) return allData;
  return allData.filter(d => d.path.toLowerCase().includes(currentSearch));
}

function countLeaves(node) {
  let n = 0;
  if (node.__leaf) n++;
  Object.keys(node).forEach(k => {
    if (k !== '__leaf') n += countLeaves(node[k]);
  });
  return n;
}

function buildTree(items) {
  const root = {};
  items.forEach(item => {
    const parts = item.path.split('/');
    let node = root;
    parts.forEach((part, i) => {
      if (!node[part]) node[part] = {};
      if (i === parts.length - 1) node[part].__leaf = item;
      node = node[part];
    });
  });
  return root;
}

function folderKey(name, depth) {
  return `${depth}:${name}`;
}

function renderTreeNode(node, name, depth, forceOpen) {
  const leaf = node.__leaf;
  const childKeys = Object.keys(node).filter(k => k !== '__leaf');
  const hasChildren = childKeys.length > 0;

  if (leaf && !hasChildren) {
    const check = leaf.split_done ? '<span class="tree-leaf-check" title="Already split">&#10003;</span>' : '';
    return `<li>
      <div class="tree-leaf${leaf.split_done ? ' done' : ''}" data-path="${esc(leaf.path)}" onclick="navigateTo(encodeURIComponent(this.dataset.path))">
        <span class="tree-leaf-name">${check}${esc(name)}</span>
        <span class="tree-leaf-meta">${leaf.cue_files.length} cue</span>
      </div>
    </li>`;
  }

  const fk = folderKey(name, depth);
  const isOpen = forceOpen || openFolders.has(fk);

  let html = '<li>';
  const cnt = countLeaves(node);
  html += `<div class="tree-folder" data-fk="${esc(fk)}" onclick="toggleFolder(this, this.dataset.fk)">
    <span class="tree-arrow${isOpen ? ' open' : ''}">&#9654;</span>
    <span class="tree-folder-name">${esc(name)}</span>
    <span class="tree-folder-count">(${cnt})</span>
  </div>`;
  html += `<ul class="tree-children${isOpen ? ' open' : ''}">`;

  if (leaf) {
    const check = leaf.split_done ? '<span class="tree-leaf-check" title="Already split">&#10003;</span>' : '';
    html += `<li>
      <div class="tree-leaf${leaf.split_done ? ' done' : ''}" data-path="${esc(leaf.path)}" onclick="navigateTo(encodeURIComponent(this.dataset.path))">
        <span class="tree-leaf-name" style="font-style:italic">${check}[this folder]</span>
        <span class="tree-leaf-meta">${leaf.cue_files.length} cue</span>
      </div>
    </li>`;
  }

  const folders = [], leaves = [];
  childKeys.forEach(k => {
    const child = node[k];
    const cKeys = Object.keys(child).filter(ck => ck !== '__leaf');
    if (cKeys.length > 0 || (child.__leaf && cKeys.length > 0)) folders.push(k);
    else if (child.__leaf) leaves.push(k);
    else folders.push(k);
  });
  folders.sort((a, b) => a.localeCompare(b));
  leaves.sort((a, b) => a.localeCompare(b));

  folders.forEach(k => { html += renderTreeNode(node[k], k, depth + 1, forceOpen); });
  leaves.forEach(k => { html += renderTreeNode(node[k], k, depth + 1, forceOpen); });

  html += '</ul></li>';
  return html;
}

function renderTree(items) {
  const stats = document.getElementById('stats');
  const root = document.getElementById('tree-root');
  stats.textContent = `${items.length} album${items.length === 1 ? '' : 's'} with unsplit CUE+FLAC`;

  if (!items.length) {
    root.innerHTML = '<div class="empty">No unsplit CUE+FLAC albums found</div>';
    return;
  }

  const tree = buildTree(items);
  const forceOpen = currentSearch.length > 0;
  let html = '<ul class="tree">';
  Object.keys(tree).sort((a, b) => a.localeCompare(b)).forEach(k => {
    html += renderTreeNode(tree[k], k, 0, forceOpen);
  });
  html += '</ul>';
  root.innerHTML = html;
}

function toggleFolder(el, fk) {
  const arrow = el.querySelector('.tree-arrow');
  const children = el.nextElementSibling;
  if (!children) return;
  const isOpen = children.classList.contains('open');
  children.classList.toggle('open');
  arrow.classList.toggle('open');
  if (isOpen) openFolders.delete(fk);
  else openFolders.add(fk);
}

/* ── Album page ── */

function findItem(path) {
  return allData.find(d => d.path === path);
}

async function loadAlbum(path) {
  const content = document.getElementById('album-content');
  content.innerHTML = '<div class="loading">Loading...</div>';
  window.scrollTo(0, 0);

  const item = findItem(path);
  if (!item) {
    content.innerHTML = '<div class="empty">Album not found. Data may still be loading.</div>';
    return;
  }

  const cueFile = item.cue_files[0];
  await renderAlbum(item, cueFile);
}

async function renderAlbum(item, cueFile) {
  const content = document.getElementById('album-content');

  const res = await fetch('/api/preview', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({path: item.path, cue_file: cueFile})
  });
  const info = await res.json();

  if (info.error) {
    content.innerHTML = `<div class="status-error">${esc(info.error)}</div>`;
    return;
  }

  let html = '';

  // Header with cover
  html += '<div class="album-header">';
  if (info.has_cover) {
    html += `<img class="album-cover" src="/api/cover/${encodeURIComponent(item.path)}" alt="Cover">`;
  } else {
    html += '<div class="album-cover-placeholder">No cover</div>';
  }
  html += '<div class="album-meta">';
  const doneTag = info.split_done ? '<span class="album-done-badge">&#10003; Split</span>' : '';
  html += `<h2>${esc(info.title || 'Unknown Album')} ${doneTag}</h2>`;
  html += `<div class="album-field"><b>Artist:</b> ${esc(info.performer || 'Unknown')}</div>`;
  if (info.genre) html += `<div class="album-field"><b>Genre:</b> ${esc(info.genre)}</div>`;
  if (info.date) html += `<div class="album-field"><b>Year:</b> ${esc(info.date)}</div>`;
  html += `<div class="album-field"><b>Tracks:</b> ${info.tracks.length}</div>`;
  html += `<div class="album-field"><b>Source:</b> ${esc(info.file || 'N/A')}</div>`;
  html += `<div class="detail-path">${esc(item.path)}</div>`;
  html += '</div></div>';

  // CUE selector
  if (item.cue_files.length > 1) {
    html += `<div class="cue-selector"><label>CUE file:</label><select onchange="switchCue(this.value)">`;
    item.cue_files.forEach(f => { html += `<option${f === cueFile ? ' selected' : ''}>${esc(f)}</option>`; });
    html += '</select></div>';
  }

  // Track table
  if (info.tracks.length) {
    html += '<table class="track-table"><thead><tr><th>#</th><th>Title</th><th>Artist</th><th>Index</th></tr></thead><tbody>';
    info.tracks.forEach(t => {
      html += `<tr>
        <td class="track-num">${String(t.number).padStart(2,'0')}</td>
        <td>${esc(t.title)}</td>
        <td>${esc(t.performer)}</td>
        <td class="track-num">${t.index || ''}</td>
      </tr>`;
    });
    html += '</tbody></table>';
  }

  const splitLabel = info.split_done
    ? `Split again (${info.output_tracks} tracks in output)`
    : `Split ${info.tracks.length} tracks`;
  html += `<button class="btn btn-primary" id="split-btn" data-path="${esc(item.path)}" data-cue="${esc(cueFile)}" onclick="doSplit(this.dataset.path, this.dataset.cue)">${splitLabel}</button>`;
  html += '<div id="job-status"></div>';

  content.innerHTML = html;
}

async function switchCue(cueFile) {
  const path = decodeURIComponent(location.hash.slice(1));
  const item = findItem(path);
  if (item) await renderAlbum(item, cueFile);
}

async function doSplit(path, cueFile) {
  const btn = document.getElementById('split-btn');
  const statusEl = document.getElementById('job-status');
  btn.disabled = true;
  btn.textContent = 'Processing...';

  const res = await fetch('/api/split', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({path: path, cue_file: cueFile})
  });
  const data = await res.json();

  if (data.error) {
    statusEl.innerHTML = `<div class="status-error">${esc(data.error)}</div>`;
    btn.disabled = false;
    btn.textContent = 'Retry';
    return;
  }

  pollJob(data.job_id, btn);
}

function renderProgress(job) {
  const pct = job.progress_total > 0
    ? Math.round((job.progress_current / job.progress_total) * 100) : 0;
  const barClass = job.status === 'done' ? ' done' : job.status === 'error' ? ' error' : '';

  let html = '<div class="progress-wrap">';
  html += `<div class="progress-bar-outer"><div class="progress-bar-inner${barClass}" style="width:${pct}%"></div></div>`;
  html += `<div class="progress-text"><span>${esc(job.progress_detail || job.status)}</span>`;
  if (job.progress_total > 0) html += `<span>${job.progress_current}/${job.progress_total} (${pct}%)</span>`;
  html += '</div></div>';

  if (job.status === 'error')
    html += `<div class="status-error">${esc(job.message || 'Unknown error')}</div>`;

  if (job.status === 'done' && job.result_files && job.result_files.length) {
    html += '<div class="result-files">';
    job.result_files.forEach(f => { html += `<div>${esc(f)}</div>`; });
    html += '</div>';
  }
  return html;
}

async function pollJob(jobId, btn) {
  const statusEl = document.getElementById('job-status');
  if (!statusEl) return;
  const res = await fetch(`/api/status/${encodeURIComponent(jobId)}`);
  const job = await res.json();
  statusEl.innerHTML = renderProgress(job);

  if (job.status === 'done' || job.status === 'error') {
    btn.disabled = false;
    btn.textContent = job.status === 'done' ? 'Split again' : 'Retry';
  } else {
    setTimeout(() => pollJob(jobId, btn), 500);
  }
}

/* ── Search ── */

document.getElementById('search').addEventListener('input', (e) => {
  currentSearch = e.target.value.toLowerCase();
  renderTree(filteredData());
});

scan();
</script>
</body>
</html>
